name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Nothing-Vault.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nothing-vault-debug
          path: app/build/outputs/apk/debug/Nothing-Vault.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Nothing Vault (Latest Build)
          body: |
            Auto-built APK from latest commit on `main`.
            Download `Nothing-Vault.apk` below.
          files: app/build/outputs/apk/debug/Nothing-Vault.apk
          make_latest: true
          fail_on_unmatched_files: false
